name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint backend
        run: pnpm --filter @marketplace/backend lint

      - name: Lint frontend
        run: pnpm --filter @marketplace/frontend lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @marketplace/backend db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Backend typecheck
        run: pnpm --filter @marketplace/backend typecheck

      - name: Frontend typecheck (clean-checkout safe)
        run: |
          rm -f packages/frontend/tsconfig.tsbuildinfo
          pnpm --filter @marketplace/frontend typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @marketplace/backend db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build frontend
        run: pnpm --filter @marketplace/frontend build
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: 'ci-placeholder'

      - name: Build backend
        run: pnpm --filter @marketplace/backend build

  test:
    name: Test (unit only — no database)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Prisma client generation needs a DATABASE_URL to parse the schema,
      # but the URL does not need to be reachable.
      - name: Generate Prisma client
        run: pnpm --filter @marketplace/backend db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      # DATABASE_URL is intentionally unset so DB-dependent test suites
      # (integration.test.ts, seed.test.ts) auto-skip via describe.skipIf.
      - name: Backend tests
        run: pnpm --filter @marketplace/backend test
        env:
          DATABASE_URL: ''

      - name: Frontend tests
        run: pnpm --filter @marketplace/frontend test:unit

  prisma:
    name: Prisma Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate schema
        run: pnpm --filter @marketplace/backend db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
